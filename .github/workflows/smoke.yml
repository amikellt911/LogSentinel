name: CI Smoke

on:
  push:
    branches: [ main ,develop]
  pull_request:
    branches: [ main ,develop]
  workflow_dispatch: {}   # 手动触发按钮

jobs:
  smoke-basic:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: 拉代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.12"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r server/ai/requirements.txt
          pip install requests

      - name: 配置 CMake
        run: cmake -B server/build -S server

      - name: 编译后端
        run: cmake --build server/build -j

      - name: 运行基础冒烟
        run: python server/tests/smoke_trace_spans.py --mode basic
  smoke-advanced:
    runs-on: ubuntu-22.04
    needs: smoke-basic
    if: github.event_name == 'workflow_dispatch'   # 仅手动触发时跑
    steps:
      - name: 拉代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.12"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r server/ai/requirements.txt
          pip install requests

      - name: 配置 CMake
        run: cmake -B server/build -S server

      - name: 编译后端
        run: cmake --build server/build -j

      - name: 运行高级冒烟
        run: python server/tests/smoke_trace_spans.py --mode advanced
