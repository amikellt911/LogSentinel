name: CI Integration

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]
  workflow_dispatch: {}

jobs:
  trace-session-manager-integration:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: 拉代码
        uses: actions/checkout@v4

      - name: 配置 CMake
        run: cmake -B server/build -S server

      - name: 编译后端与测试
        run: cmake --build server/build -j

      - name: 运行 TraceSessionManager 集成测试
        run: |
          cd server/build
          ctest -R "^TraceSessionManagerIntegrationTest\\." --output-on-failure
