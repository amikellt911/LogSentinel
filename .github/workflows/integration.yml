name: CI Integration

on:
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'      # 忽略所有层级的 Markdown 文件
      - '**.pdf'     # 忽略所有 PDF 文件
      - '/docs/**'    # 忽略 docs 文件夹下的所有变动
      - 'client/**'  # 这条工作流只验证后端单测；纯前端改动不再单独拉起后端编译与测试。
      - '.vscode/**'
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'      # 忽略所有层级的 Markdown 文件
      - '**.pdf'     # 忽略所有 PDF 文件
      - '/docs/**'    # 忽略 docs 文件夹下的所有变动
      - 'client/**'  # 这条工作流只验证后端单测；纯前端改动不再单独拉起后端编译与测试。
      - '.vscode/**'
  workflow_dispatch: {}

jobs:
  trace-session-manager-integration:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: 拉代码
        uses: actions/checkout@v4

      - name: 配置 CMake
        run: cmake -B server/build -S server

      - name: 编译后端与测试
        run: cmake --build server/build -j

      - name: 运行 TraceSessionManager 集成测试
        run: |
          cd server/build
          ctest -R "^TraceSessionManagerIntegrationTest\\." --output-on-failure
