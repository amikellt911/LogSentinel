name: CI Unit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}   # 手动触发按钮

jobs:
  trace-session-manager-unit:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: 拉代码
        uses: actions/checkout@v4

      - name: 配置 CMake
        run: cmake -B server/build -S server

      - name: 编译后端与测试
        run: cmake --build server/build -j

      - name: 运行 TraceSessionManager 单元测试
        run: |
          cd server/build
          ctest -R test_trace_session_manager_unit --output-on-failure
